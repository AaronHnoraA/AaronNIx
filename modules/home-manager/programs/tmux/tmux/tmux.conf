set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g status-keys vi
set -g mode-keys vi

set -g mouse on
set -g focus-events on
setw -g aggressive-resize off
setw -g clock-mode-style 12
set -s escape-time 10
set -g history-limit 50000
set -g set-clipboard on
set -g allow-rename off

# Prefix
set -g prefix C-q
unbind C-b
unbind C-p
bind-key C-q send-prefix

# Theme
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-style "bg=#1e2030,fg=#cad3f5"
set -g message-style "bg=#8aadf4,fg=#1e2030,bold"
set -g message-command-style "bg=#8aadf4,fg=#1e2030,bold"
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#8aadf4"
set -g display-panes-colour "#6e738d"
set -g display-panes-active-colour "#8aadf4"
setw -g mode-style "fg=#cad3f5,bg=#363a4f"

set -g status-left "#[fg=#8aadf4,bold] #S "
set -g status-right "#{?client_prefix,#[fg=#eed49f,bold]PREFIX ,}#[fg=#a6da95]#(whoami)@#H #[fg=#91d7e3]%Y-%m-%d #[fg=#c6a0f6]%H:%M "

setw -g window-status-separator ""
setw -g window-status-format "#[fg=#6e738d,bg=#1e2030] #I #[fg=#cad3f5]#W "
setw -g window-status-current-format "#[fg=#1e2030,bg=#f5a97f,bold] #I #[fg=#1e2030,bold]#W "
setw -g window-status-activity-style "fg=#eed49f,bg=#1e2030"
setw -g window-status-bell-style "fg=#ed8796,bg=#1e2030,bold"

# Emacs-style workflow
unbind '"'
unbind %
unbind 0
unbind 1
unbind 2
unbind 3
unbind 4
unbind =
unbind b
unbind k
unbind n
unbind o
unbind p
bind-key c new-window -c "#{pane_current_path}"
bind-key 1 kill-pane -a
bind-key 2 split-window -v -c "#{pane_current_path}"
bind-key 3 split-window -h -c "#{pane_current_path}"
bind-key 0 kill-pane
bind-key k kill-window
bind-key o select-pane -t :.+
bind-key b command-prompt -I "#W" "find-window '%%'"
bind-key n next-window
bind-key p previous-window
bind-key = select-layout tiled
bind-key 4 switch-client -T emacs-prefix-4
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# C-x 4 style secondary window map
bind-key -T emacs-prefix-4 0 kill-pane
bind-key -T emacs-prefix-4 2 split-window -v -c "#{pane_current_path}"
bind-key -T emacs-prefix-4 3 split-window -h -c "#{pane_current_path}"
bind-key -T emacs-prefix-4 b new-window -c "#{pane_current_path}"
bind-key -T emacs-prefix-4 f command-prompt -p "new window name" "new-window -n '%%' -c '#{pane_current_path}'"

# Workflow
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key S command-prompt -I "#S" "rename-session '%%'"
bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
bind-key Tab last-window
bind-key w choose-tree -Zw
bind-key f command-prompt "find-window '%%'"
bind-key y if-shell -F "#{synchronize-panes}" \
  "set-window-option synchronize-panes off; display-message 'synchronize-panes off'" \
  "set-window-option synchronize-panes on; display-message 'synchronize-panes on'"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key l select-pane -R
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

bind-key P if-shell "command -v cd-to-project >/dev/null 2>&1" \
  "new-window -n project-selector 'cd-to-project'" \
  "display-message 'cd-to-project not found'"

# Copy mode
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Copy mode navigation
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Keep Vim-aware pane switching available under prefix to avoid Emacs conflicts.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf|atuin)(diff)?$'"
bind-key C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
