# vim:filetype=kitty
# vim:fdm=marker

# unmap
map cmd+f no_op
map alt+shift+h no_op
map alt+shift+l no_op
map cmd+shift+d no_op
map ctrl+shift+r no_op
map cmd+enter no_op
map cmd+r no_op

# tmux
map cmd+1 combine : send_key ctrl+p : send_key 1
map cmd+2 combine : send_key ctrl+p : send_key 2
map cmd+3 combine : send_key ctrl+p : send_key 3
map cmd+4 combine : send_key ctrl+p : send_key 4
map cmd+5 combine : send_key ctrl+p : send_key 5
map cmd+6 combine : send_key ctrl+p : send_key 6
map cmd+7 combine : send_key ctrl+p : send_key 7
map cmd+8 combine : send_key ctrl+p : send_key 8
map cmd+9 combine : send_key ctrl+p : send_key 9
map cmd+t combine : send_key ctrl+p : send_key c
map cmd+w combine : send_key ctrl+p : send_text all :kill-window\r
map cmd+q combine : send_key ctrl+p : send_text all :kill-session\r
map cmd+shift+h combine : send_key ctrl+p : send_key p
map cmd+shift+l combine : send_key ctrl+p : send_key n
map cmd+shift+f show_scrollback
map ctrl+shift+[ combine : send_key ctrl+p : send_key p
map ctrl+shift+] combine : send_key ctrl+p : send_key n

# vim
map cmd+s send_text all \e:w\r
# map cmd+/ combine : send_key space : send_key /
# map cmd+shift+s send_text all \e\e:Telescope lsp_document_symbols \r
# map cmd+g send_text all \e:LazyGitCurrentFile\r
# map cmd+shift+g send_text all \e\e:Telescope git_submodules\r
# map cmd+shift+r send_text all \e\e:OverseerQuickAction\r
# map cmd+p send_text all :Telescope find_files\r
# map cmd+o send_text all :Telescope find_files\r
# map cmd+shift+f send_text all :Telescope live_grep_args\r
# map cmd+b send_text all :Neotree toggle\r

macos_option_as_alt yes
map cmd+x combine : send_key alt+x


# hints
map ctrl+shift+p kitten hints --type path --program @
map ctrl+shift+h kitten hints --type hash --program @
map ctrl+shift+d kitten hints --customize-processing ~/.config/kitty/helpers/custom_match.py --program -
