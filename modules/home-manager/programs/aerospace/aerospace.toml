[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = ['move-node-to-workspace 0']
[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = ['move-node-to-workspace 0']
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['move-node-to-workspace 3']
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 3']
[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = 'Bitwarden'
check-further-callbacks = true
run = ['layout floating', 'move-node-to-workspace 4']
[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = ['move-node-to-workspace 4']
[[on-window-detected]]
if.app-id = 'com.microsoft.rdc.macos'
run = ['move-node-to-workspace 5']
[[on-window-detected]]
if.app-id = 'com.moonlight-stream.Moonlight'
run = ['move-node-to-workspace 5']
[[on-window-detected]]
if.app-id = 'com.tradingview.tradingviewapp.desktop'
run = ['move-node-to-workspace 6']
[[on-window-detected]]
if.app-id = 'org.zotero.zotero'
if.window-title-regex-substring = '元数据检索'
check-further-callbacks = true
run = ['layout floating', 'move-node-to-workspace A']
[[on-window-detected]]
if.app-id = 'org.zotero.zotero'
run = ['move-node-to-workspace A', 'join-with up']
[[on-window-detected]]
if.app-id = 'QReader.MarginStudy.easy'
run = ['move-node-to-workspace B', 'join-with down']
[[on-window-detected]]
if.app-id = 'org.gnu.Emacs'
run = ['move-node-to-workspace C', 'layout floating']
#run = ['move-node-to-workspace C']
[[on-window-detected]]
if.app-id = 'com.bardsoftware.ganttproject'
run = ['move-node-to-workspace G']



[[on-window-detected]]
check-further-callbacks = true  # 允许继续检查后续规则
run = 'layout floating'  # 或使用 ignore()
