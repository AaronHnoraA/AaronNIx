# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  'exec-and-forget borders active_color=0xffffffff inactive_color=0x00494d64 width=3 blacklist="iPhone Mirroring,Zotero"',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
#on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 5
outer.bottom = 5
outer.top = 5
outer.right = 5


[mode.main.binding]

ctrl-cmd-shift-slash = 'layout tiles horizontal vertical'
ctrl-cmd-shift-comma = 'layout accordion horizontal vertical'

ctrl-alt-cmd-shift-h = 'focus left --boundaries all-monitors-outer-frame --boundaries-action stop'
ctrl-alt-cmd-shift-j = 'focus down --boundaries all-monitors-outer-frame --boundaries-action stop'
ctrl-alt-cmd-shift-k = 'focus up --boundaries all-monitors-outer-frame --boundaries-action stop'
ctrl-alt-cmd-shift-l = 'focus right --boundaries all-monitors-outer-frame --boundaries-action stop'

ctrl-alt-cmd-shift-minus = 'resize smart -50'
ctrl-alt-cmd-shift-equal = 'resize smart +50'

ctrl-alt-cmd-shift-1 = 'workspace 1'
ctrl-alt-cmd-shift-2 = 'workspace 2'
ctrl-alt-cmd-shift-3 = 'workspace 3'
ctrl-alt-cmd-shift-4 = 'workspace 4'
ctrl-alt-cmd-shift-5 = 'workspace 5'
ctrl-alt-cmd-shift-6 = 'workspace 6'
ctrl-alt-cmd-shift-7 = 'workspace 7'
ctrl-alt-cmd-shift-8 = 'workspace 8'
ctrl-alt-cmd-shift-9 = 'workspace 9'
ctrl-alt-cmd-shift-0 = 'workspace 0'

ctrl-alt-cmd-shift-a = 'workspace A'
ctrl-alt-cmd-shift-b = 'workspace B'
ctrl-alt-cmd-shift-c = 'workspace C'
ctrl-alt-cmd-shift-d = 'workspace D'
ctrl-alt-cmd-shift-e = 'workspace E'
ctrl-alt-cmd-shift-f = 'workspace F'
ctrl-alt-cmd-shift-g = 'workspace G'
ctrl-alt-cmd-shift-i = 'workspace I'
ctrl-alt-cmd-shift-m = 'workspace M'
ctrl-alt-cmd-shift-n = 'workspace N'
ctrl-alt-cmd-shift-o = 'workspace O'
ctrl-alt-cmd-shift-p = 'workspace P'
ctrl-alt-cmd-shift-q = 'workspace Q'
ctrl-alt-cmd-shift-r = 'workspace R'
ctrl-alt-cmd-shift-s = 'workspace S'
ctrl-alt-cmd-shift-t = 'workspace T'
ctrl-alt-cmd-shift-u = 'workspace U'
ctrl-alt-cmd-shift-v = 'workspace V'
ctrl-alt-cmd-shift-w = 'workspace W'
ctrl-alt-cmd-shift-x = 'workspace X'
ctrl-alt-cmd-shift-y = 'workspace Y'
ctrl-alt-cmd-shift-z = 'workspace Z'

cmd-shift-f = 'layout floating'
cmd-shift-t = 'layout tiling'

ctrl-cmd-shift-right = 'exec-and-forget aerospace list-workspaces --monitor focused --empty no | aerospace workspace --stdin --wrap-around next'
ctrl-cmd-shift-left = 'exec-and-forget aerospace list-workspaces --monitor focused --empty no | aerospace workspace --stdin --wrap-around prev'
ctrl-alt-cmd-shift-tab = 'workspace-back-and-forth'

ctrl-alt-cmd-shift-semicolon = 'mode service'

# 原来 shift 那层，改成 prefix + space 进入子模式
ctrl-alt-cmd-shift-space = 'mode hyper-space'


